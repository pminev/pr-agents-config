name: Agent on issue

# Fires when an issue is opened. The job runs on a SELF-HOSTED runner on your
# local machine, where the agent CLI (claude / qwen / antigravity) is installed.
#
# By default it only runs when the issue carries the label named in
# AGENT_TRIGGER_LABEL (default "agent"), so casual issues don't each spin up a
# session. Set the repo/org variable AGENT_REQUIRE_LABEL=false to run on every
# new issue instead.
on:
  issues:
    types: [opened, labeled]
  # Follow-up iterations: a comment starting with "/agent" on the issue OR on
  # the resulting PR re-runs the agent on top of the existing branch.
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to run the agent against
        required: true

# One run per issue; a second event for the same issue cancels the older run.
concurrency:
  group: agent-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: self-hosted
    timeout-minutes: ${{ fromJSON(vars.AGENT_TIMEOUT_MINUTES || '45') }}

    permissions:
      contents: write        # push branches
      issues: write          # comment back on the issue
      pull-requests: write   # open the PR

    steps:
      - name: Decide whether to run
        id: gate
        env:
          REQUIRE_LABEL: ${{ vars.AGENT_REQUIRE_LABEL != 'false' }}
          TRIGGER_LABEL: ${{ vars.AGENT_TRIGGER_LABEL || 'agent' }}
          HAS_LABEL: ${{ contains(github.event.issue.labels.*.name, vars.AGENT_TRIGGER_LABEL || 'agent') }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR_TYPE: ${{ github.event.comment.user.type }}
        shell: bash
        run: |
          set -euo pipefail
          run=false        # whether to run at all
          followup=false   # whether this is a comment-driven iteration

          case "$EVENT" in
            workflow_dispatch)
              run=true ;;

            issue_comment)
              # Only "/agent ..." comments, and never our own bot comments
              # (avoids an infinite loop from the PR-notification comment).
              if [ "$COMMENT_AUTHOR_TYPE" != "Bot" ]; then
                case "$COMMENT_BODY" in
                  /agent*) run=true; followup=true ;;
                esac
              fi
              ;;

            issues)
              if [ "$REQUIRE_LABEL" != "true" ]; then
                # Label gating off: run once, on open (ignore extra label events).
                [ "$ACTION" = "opened" ] && run=true
              else
                # Label gating on: run only when the trigger label is present.
                [ "$HAS_LABEL" = "true" ] && run=true
              fi
              ;;
          esac

          echo "Decision: run=$run followup=$followup (event=$EVENT action=${ACTION:-})"
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "followup=$followup" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve issue details
        if: steps.gate.outputs.run == 'true'
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json number,title,body,url \
            > "$RUNNER_TEMP/issue.json"
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Prepare working branch
        if: steps.gate.outputs.run == 'true'
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$IS_PR_COMMENT" = "true" ]; then
            # "/agent" comment on a PR: reuse that PR's own head branch (its
            # number != the original issue number, so don't derive from it).
            BRANCH="$(gh pr view "$ISSUE_NUMBER" --json headRefName -q .headRefName)"
          else
            BRANCH="agent/issue-${ISSUE_NUMBER}"
          fi
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git rev-parse --verify "refs/remotes/origin/$BRANCH" >/dev/null 2>&1; then
            # Follow-up: build on top of the existing branch so prior work stays.
            git checkout -B "$BRANCH" "origin/$BRANCH"
            echo "Reusing existing branch $BRANCH"
          else
            git checkout -B "$BRANCH"
            echo "Creating new branch $BRANCH"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run agent
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          # Which CLI to use: claude | qwen | antigravity. Set as a repo variable.
          AGENT_CLI: ${{ vars.AGENT_CLI || 'claude' }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL || '' }}
          # Run the chosen CLI against a local model via `ollama launch`.
          USE_OLLAMA: ${{ vars.USE_OLLAMA || 'false' }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || '' }}
          OLLAMA_HOST: ${{ vars.OLLAMA_HOST || '' }}
          ISSUE_JSON: ${{ runner.temp }}/issue.json
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REPO: ${{ github.repository }}
          # Follow-up context: the "/agent ..." comment and whether this is one.
          IS_FOLLOWUP: ${{ steps.gate.outputs.followup }}
          FEEDBACK: ${{ github.event.comment.body }}
          # Secrets for whichever agent you use (set the ones you need).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        shell: bash
        run: ./scripts/run-agent.sh

      - name: Open pull request
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: ./scripts/open-pr.sh
