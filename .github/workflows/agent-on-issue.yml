name: Agent on issue

# Fires when an issue is opened (or a "/agent" comment is posted). Work runs on
# a SELF-HOSTED runner where the agent CLI (claude / qwen / antigravity) lives.
#
# Two jobs:
#   route  — runs on ANY runner; decides whether to run and, for follow-ups,
#            looks up the pinned runner + saved session id from the issue's
#            session marker comment.
#   agent  — runs on the PINNED runner (so it has the saved session to resume);
#            checks out, runs the agent, opens/updates the PR.
on:
  issues:
    types: [opened, labeled]
  # Follow-up iterations: a comment starting with "/agent" on the issue OR on
  # the resulting PR re-runs the agent on top of the existing branch.
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to run the agent against
        required: true

# One run per issue; a second event for the same issue queues behind the first.
concurrency:
  group: agent-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Decide whether to run, and recover pinning/session state for follow-ups.
  # Runs on any runner — it only calls the GitHub API.
  # ---------------------------------------------------------------------------
  route:
    runs-on: self-hosted
    permissions:
      issues: read
      pull-requests: read
    outputs:
      run: ${{ steps.gate.outputs.run }}
      followup: ${{ steps.gate.outputs.followup }}
      number: ${{ steps.gate.outputs.number }}
      runner_label: ${{ steps.session.outputs.runner_label }}
      session_id: ${{ steps.session.outputs.session_id }}
      session_cli: ${{ steps.session.outputs.session_cli }}
      runs_on_labels: ${{ steps.labels.outputs.runs_on_labels }}
    steps:
      - name: Decide whether to run
        id: gate
        env:
          REQUIRE_LABEL: ${{ vars.AGENT_REQUIRE_LABEL != 'false' }}
          TRIGGER_LABEL: ${{ vars.AGENT_TRIGGER_LABEL || 'agent' }}
          HAS_LABEL: ${{ contains(github.event.issue.labels.*.name, vars.AGENT_TRIGGER_LABEL || 'agent') }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR_TYPE: ${{ github.event.comment.user.type }}
          NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          DEFAULT_CLI: ${{ vars.AGENT_CLI || 'claude' }}
          DEFAULT_OLLAMA: ${{ vars.USE_OLLAMA || 'false' }}
          LABEL_ADDED: ${{ github.event.label.name }}
        shell: bash
        run: |
          set -euo pipefail
          run=false        # whether to run at all
          followup=false   # whether this is a comment-driven iteration

          case "$EVENT" in
            workflow_dispatch)
              run=true ;;
            issue_comment)
              # Only "/agent ..." comments, and never our own bot comments
              # (avoids an infinite loop from the PR-notification comment).
              if [ "$COMMENT_AUTHOR_TYPE" != "Bot" ]; then
                case "$COMMENT_BODY" in
                  /agent*) run=true; followup=true ;;
                esac
              fi
              ;;
            issues)
              if [ "$REQUIRE_LABEL" != "true" ]; then
                [ "$ACTION" = "opened" ] && run=true
              else
                if [ "$ACTION" = "opened" ]; then
                  [ "$HAS_LABEL" = "true" ] && run=true
                elif [ "$ACTION" = "labeled" ]; then
                  [ "$LABEL_ADDED" = "$TRIGGER_LABEL" ] && run=true
                fi
              fi
              ;;
          esac

          req_cli="$DEFAULT_CLI"
          req_ollama="$DEFAULT_OLLAMA"

          text=""
          if [ "$followup" = "true" ]; then
            text="$COMMENT_BODY"
          elif [ "$run" = "true" ]; then
            text="$ISSUE_BODY"
          fi

          if [[ "$text" == /agent* ]]; then
            first_line="${text%%$'\n'*}"
            if [[ "$first_line" =~ --cli[[:space:]=]([a-zA-Z0-9.-]+) ]]; then
              req_cli="${BASH_REMATCH[1]}"
            fi
            if [[ "$first_line" =~ --ollama([[:space:]]|$) ]]; then
              req_ollama="true"
            fi
          fi

          echo "Decision: run=$run followup=$followup number=$NUMBER (event=$EVENT)"
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "followup=$followup" >> "$GITHUB_OUTPUT"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "req_cli=$req_cli" >> "$GITHUB_OUTPUT"
          echo "req_ollama=$req_ollama" >> "$GITHUB_OUTPUT"

      - name: Look up pinned runner + session
        id: session
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NUMBER: ${{ steps.gate.outputs.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        shell: bash
        run: |
          set -euo pipefail
          # Session markers are posted on the ORIGINAL issue. If the comment was
          # on a PR, map back to the original issue via the PR's head branch.
          ORIG="$NUMBER"
          if [ "$IS_PR_COMMENT" = "true" ]; then
            head="$(gh pr view "$NUMBER" --json headRefName -q .headRefName 2>/dev/null || true)"
            case "$head" in agent/issue-*) ORIG="${head#agent/issue-}" ;; esac
          fi

          # Newest marker wins: <!-- agent-session runner=X session=Y cli=Z -->
          marker="$(gh issue view "$ORIG" --json comments \
            -q '[.comments[].body | select(test("<!-- agent-session"))] | last // ""' 2>/dev/null || true)"

          rl=""; sid=""; cli=""
          if [ -n "$marker" ]; then
            rl="$(printf '%s' "$marker"  | sed -n 's/.*runner=\([^ ]*\).*/\1/p')"
            sid="$(printf '%s' "$marker" | sed -n 's/.*session=\([^ ]*\).*/\1/p')"
            cli="$(printf '%s' "$marker" | sed -n 's/.*cli=\([^ ]*\).*/\1/p')"
            echo "Recovered pin: runner=$rl session=$sid cli=$cli"
          else
            echo "No session marker found (fresh run)."
          fi
          echo "runner_label=$rl" >> "$GITHUB_OUTPUT"
          echo "session_id=$sid" >> "$GITHUB_OUTPUT"
          echo "session_cli=$cli" >> "$GITHUB_OUTPUT"

      - name: Compute runner labels
        id: labels
        env:
          RL: ${{ steps.session.outputs.runner_label }}
          REQ_CLI: ${{ steps.gate.outputs.req_cli }}
          REQ_OLLAMA: ${{ steps.gate.outputs.req_ollama }}
        shell: bash
        run: |
          if [ -n "$RL" ]; then
            echo 'runs_on_labels=["self-hosted", "'"$RL"'"]' >> "$GITHUB_OUTPUT"
          else
            labels='["self-hosted", "'"$REQ_CLI"'"'
            if [ "$REQ_OLLAMA" = "true" ]; then
              labels="$labels, \"ollama\""
            fi
            labels="$labels]"
            echo "runs_on_labels=$labels" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Do the work on the pinned runner (or any runner on a fresh run).
  # ---------------------------------------------------------------------------
  agent:
    needs: route
    if: needs.route.outputs.run == 'true'
    # Pin to the origin runner when we recovered one; otherwise target the requested cli/ollama
    runs-on: ${{ fromJSON(needs.route.outputs.runs_on_labels) }}
    timeout-minutes: ${{ fromJSON(vars.AGENT_TIMEOUT_MINUTES || '45') }}

    # Each run works in a folder named for the issue (e.g. issue_1).
    env:
      ISSUE_DIR: issue_${{ needs.route.outputs.number }}

    permissions:
      contents: write        # push branches
      issues: write          # comment back on the issue
      pull-requests: write   # open the PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ env.ISSUE_DIR }}

      - name: Resolve issue details
        working-directory: ${{ env.ISSUE_DIR }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.route.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json number,title,body,url \
            > "$RUNNER_TEMP/issue.json"

      - name: Prepare working branch
        working-directory: ${{ env.ISSUE_DIR }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.route.outputs.number }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$IS_PR_COMMENT" = "true" ]; then
            BRANCH="$(gh pr view "$ISSUE_NUMBER" --json headRefName -q .headRefName)"
          else
            BRANCH="agent/issue-${ISSUE_NUMBER}"
          fi
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git rev-parse --verify "refs/remotes/origin/$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            echo "Reusing existing branch $BRANCH"
          else
            git checkout -B "$BRANCH"
            echo "Creating new branch $BRANCH"
          fi

      - name: Run agent
        working-directory: ${{ env.ISSUE_DIR }}
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_CLI: ${{ vars.AGENT_CLI || 'claude' }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL || '' }}
          USE_OLLAMA: ${{ vars.USE_OLLAMA || 'false' }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || '' }}
          OLLAMA_HOST: ${{ vars.OLLAMA_HOST || '' }}
          ISSUE_JSON: ${{ runner.temp }}/issue.json
          ISSUE_NUMBER: ${{ needs.route.outputs.number }}
          REPO: ${{ github.repository }}
          # Follow-up context + session to resume (recovered by the route job).
          IS_FOLLOWUP: ${{ needs.route.outputs.followup }}
          FEEDBACK: ${{ github.event.comment.body }}
          SESSION_ID: ${{ needs.route.outputs.session_id }}
          SESSION_CLI: ${{ needs.route.outputs.session_cli }}
          # Secrets for whichever agent you use (set the ones you need).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        shell: bash
        run: ./scripts/run-agent.sh

      - name: Open pull request
        working-directory: ${{ env.ISSUE_DIR }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.route.outputs.number }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # RUNNER_NAME is provided automatically; used to pin future follow-ups.
        shell: bash
        run: ./scripts/open-pr.sh
